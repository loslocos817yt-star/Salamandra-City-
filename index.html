<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salamandra City - Menu Pro</title>
    <link href="https://fonts.cdnfonts.com/css/pricedown" rel="stylesheet">
    <link rel="icon" type="image/png" href="recursos/web/logo.png">

    <style>
        :root {
            --accent: #ffcc00;
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Pricedown', sans-serif;
            color: white;
        }

        #canvas-bg {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            filter: blur(3px);
            opacity: 0.4;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0, 0, 0, 0.8) 100%);
            z-index: 2;
            pointer-events: none;
        }

        #ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .logo-box {
            animation: float 4s ease-in-out infinite;
            margin-bottom: 40px;
        }

        .logo-img {
            width: 85vw;
            max-width: 550px;
            filter: drop-shadow(0 0 20px rgba(255, 204, 0, 0.3));
        }

        .menu-nav {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }

        .btn-gta {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 15px;
            font-size: 26px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            cursor: pointer;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .btn-gta:hover {
            background: #fff;
            color: #000;
            transform: scale(1.05) skewX(-5deg);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

        .btn-gta.play {
            border-left: 10px solid var(--accent);
        }

        #settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        .settings-panel {
            background: var(--panel);
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border: 3px solid var(--accent);
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.2);
            position: relative;
            transform: skewX(-2deg);
        }

        .settings-title {
            font-size: 35px;
            color: var(--accent);
            margin-bottom: 25px;
            border-bottom: 2px solid var(--accent);
            text-align: left;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #222;
            transition: 0.4s;
            border: 1px solid #444;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 3px;
            background-color: white;
            transition: 0.4s;
        }

        input:checked + .slider {
            background-color: var(--accent);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: black;
        }

        .btn-save {
            margin-top: 15px;
            padding: 12px;
            background: var(--accent);
            color: black;
            border: none;
            font-family: 'Pricedown', sans-serif;
            font-size: 22px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn-save:hover {
            background: white;
            transform: scale(1.02);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <canvas id="canvas-bg"></canvas>
    <div class="overlay"></div>
    <div class="scanlines"></div>

    <div id="ui-layer">
        <div class="logo-box">
            <img src="recursos/ui/logo.png" alt="SALAMANDRA CITY" class="logo-img">
        </div>

        <nav class="menu-nav">
            <a href="game.html" class="btn-gta play" id="btn-play">INICIAR JUEGO</a>
            <a href="#" class="btn-gta" onclick="alert('Cargando mapa...')">VECINDARIO</a>
            <a href="#" class="btn-gta" id="btn-settings">AJUSTES</a>
        </nav>
    </div>

    <div id="settings-modal">
        <div class="settings-panel">
            <div class="settings-title">CONFIGURACIÓN</div>

            <div class="setting-row">
                <span style="letter-spacing: 1px;">VISITAS TOTALES</span>
                <div style="display: flex; align-items: center; background: #000; padding: 4px 8px; border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);">
                    <img src="https://hitwebcounter.com/counter/counter.php?page=21484093&style=0040&nbdigits=5&type=page&initCount=0" title="Visitas" alt="Visitas" border="0" style="height: 22px; filter: brightness(1.2) drop-shadow(0 0 3px #00ff00);">
                </div>
            </div>

            <div class="setting-row">
                <span>1ª PERSONA (FPS)</span>
                <label class="switch">
                    <input type="checkbox" id="check-fps">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <span>MÚSICA</span>
                <label class="switch">
                    <input type="checkbox" id="check-music">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-row">
                <span>HORIZONTAL</span>
                <label class="switch">
                    <input type="checkbox" id="check-horizontal">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn-save" id="btn-save-settings">ACEPTAR</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playBeep(freq, dur, vol) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }

        const modal = document.getElementById('settings-modal');
        const checkFPS = document.getElementById('check-fps');
        const checkMusic = document.getElementById('check-music');
        const checkHorizontal = document.getElementById('check-horizontal');

        checkFPS.checked = localStorage.getItem('fps_mode') === 'true';
        checkMusic.checked = localStorage.getItem('music_on') !== 'false';
        checkHorizontal.checked = localStorage.getItem('horizontal_mode') === 'true';

        document.querySelectorAll('.btn-gta').forEach(btn => {
            btn.onmouseenter = () => playBeep(900, 0.05, 0.02);

            btn.onclick = e => {
                if (btn.id === 'btn-settings') {
                    e.preventDefault();
                    playBeep(1100, 0.1, 0.05);
                    modal.style.display = 'flex';
                    return;
                }

                playBeep(1200, 0.15, 0.1);

                if (btn.id === 'btn-play') {
                    e.preventDefault();
                    setTimeout(() => window.location.href = btn.href, 200);
                }
            };
        });

        document.getElementById('btn-save-settings').onclick = () => {
            playBeep(800, 0.1, 0.05);

            localStorage.setItem('fps_mode', checkFPS.checked);
            localStorage.setItem('music_on', checkMusic.checked);
            localStorage.setItem('horizontal_mode', checkHorizontal.checked);

            modal.style.display = 'none';
        };

        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        let dots = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        for (let i = 0; i < 40; i++) {
            dots.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                s: Math.random() * 2,
                vx: Math.random() - 0.5,
                vy: Math.random() - 0.5
            });
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ffcc00";

            dots.forEach(d => {
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.s, 0, 7);
                ctx.fill();

                d.x += d.vx;
                d.y += d.vy;

                if (d.x < 0 || d.x > canvas.width) d.vx *= -1;
                if (d.y < 0 || d.y > canvas.height) d.vy *= -1;
            });

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
</html>
