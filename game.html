<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Salamandra Theft Auto - Juego 3D con controles táctiles">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <title>Salamandra Theft Auto</title>
    <link rel="icon" type="image/png" href="recursos/web/logo.png">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/gui.css">
    <style>
        /* Estilos para el botón de tres puntos y el menú de pausa */
        #btn-pause-dots {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            z-index: 1000;
            cursor: pointer;
        }
        .dot { width: 6px; height: 6px; background: white; border-radius: 50%; }

        #menu-pausa {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Oculto por defecto */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .pausa-titulo {
            font-family: 'Arial Black', sans-serif;
            color: #ffcc00;
            font-size: 40px;
            margin-bottom: 30px;
            text-shadow: 2px 2px #000;
        }

        .btn-pausa {
            width: 250px;
            padding: 15px;
            margin: 10px;
            background: white;
            color: black;
            border: none;
            font-family: sans-serif;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-pausa:hover { background: #ffcc00; transform: scale(1.05); }
        .btn-pausa.rojo { background: #ff4444; color: white; }
    </style>
</head>
<body>

    <audio id="musica-fondo" src="./recursos/ogg/music_game.ogg" preload="auto" loop autoplay></audio>
    
    <div id="btn-pause-dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>

    <div id="menu-pausa">
        <div class="pausa-titulo">PAUSA</div>
        <button class="btn-pausa" id="resume-game">REANUDAR</button>
        <button class="btn-pausa rojo" id="go-to-menu">IR AL MENÚ</button>
    </div>

    <div class="hud-wrapper">
        <div class="salamandra-avatar animada"></div>
        <div class="vida-container">
            <div class="corazon-ui"></div>
            <div class="corazon-ui"></div>
            <div class="corazon-ui"></div>
        </div>
    </div>
    
    <div id="crosshair" aria-hidden="true" style="display: block;">
        <div class="c-line c-v"></div>
        <div class="c-line c-h"></div>
    </div>

    <div id="controles" aria-label="Joystick de movimiento"></div>
    
    <button id="btn-saltar" aria-label="Saltar">SALTAR</button>
    <button id="btn-arma" aria-label="Equipar arma">UZI</button>
    <button id="btn-fuego" aria-label="Disparar">FUEGO</button>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { crearSalamandra } from './js/modelos/salamandra.js';
        import { crearArma } from './js/modelos/arma.js'; 
        import { actualizarAnimacion } from './js/animaciones/animacion.js';
        import { gestionarSalto } from './js/animaciones/saltar.js';
        import { generarMapa } from './js/functions/mundo.js';
        import { CicloDiaNoche } from './js/functions/clima.js';

        // LÓGICA DE PAUSA
        let gamePaused = false;
        let animationId;
        const menuPausa = document.getElementById('menu-pausa');
        const musicaGame = document.getElementById('musica-fondo');

        const pausarJuego = () => {
            gamePaused = true;
            menuPausa.style.display = 'flex';
            musicaGame.pause();
            cancelAnimationFrame(animationId);
        };

        const reanudarJuego = () => {
            gamePaused = false;
            menuPausa.style.display = 'none';
            if (localStorage.getItem('music_on') !== 'false') musicaGame.play();
            lastTime = performance.now();
            animate();
        };

        document.getElementById('btn-pause-dots').onclick = pausarJuego;
        document.getElementById('resume-game').onclick = reanudarJuego;
        document.getElementById('go-to-menu').onclick = () => window.location.href = 'index.html';

        // Configuración inicial Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1500);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const colorCieloInicial = 0x88ccff;
        scene.background = new THREE.Color(colorCieloInicial);
        scene.fog = new THREE.FogExp2(colorCieloInicial, 0.001);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        const sol = new THREE.DirectionalLight(0xfff0d0, 1.3);
        sol.position.set(20, 40, 10);
        scene.add(sol);

        const pasto = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
        pasto.rotation.x = -Math.PI / 2;
        scene.add(pasto);

        const jugador = crearSalamandra();
        scene.add(jugador);

        const casas = [], edificios = [], balas = [], lootsEnMapa = [];
        const sistemaNPC = generarMapa(scene, casas, edificios, lootsEnMapa);

        let clima = null;
        try { clima = new CicloDiaNoche(scene, sol, new THREE.AmbientLight(0xffffff, 0.8), scene.fog); } catch(e) {}

        const sonidoCaminar = new Audio('./recursos/ogg/caminar.ogg');
        sonidoCaminar.loop = true;
        sonidoCaminar.volume = 0.25;

        // Joystick
        let mov = { x: 0, y: 0 };
        const joy = nipplejs.create({ 
            zone: document.getElementById('controles'), 
            mode: 'static', 
            position: { left: '60px', bottom: '60px' }, 
            color: 'yellow',
            size: 100
        });
        joy.on('move', (e, d) => { mov = { x: -d.vector.x, y: -d.vector.y }; });
        joy.on('end', () => mov = { x: 0, y: 0 });

        // Cámara FPS
        let lon = 0, lat = 0, touchX = 0, touchY = 0, isTouching = false;

        document.addEventListener('touchstart', (e) => {
            if (gamePaused) return;
            if (e.touches[0].clientX > window.innerWidth / 2) {
                isTouching = true;
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isTouching || gamePaused) return;
            const dx = e.touches[0].clientX - touchX;
            const dy = e.touches[0].clientY - touchY;
            lon -= dx * 0.3; lat -= dy * 0.3; 
            lat = Math.max(-85, Math.min(85, lat)); 
            touchX = e.touches[0].clientX; touchY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchend', () => isTouching = false);

        // Salto y Armas
        const sDat = { enAire: false, velocidadY: 0, gravedad: 0.0015, fuerzaImpulso: 0.06 };
        document.getElementById('btn-saltar').onclick = () => { if(!sDat.enAire && !gamePaused) { sDat.enAire = true; sDat.velocidadY = sDat.fuerzaImpulso; } };

        let tieneArma = false, modoCombate = false;
        const miArma = crearArma(); 
        miArma.visible = false; 
        jugador.add(miArma);

        const btnArma = document.getElementById('btn-arma');
        const btnFuego = document.getElementById('btn-fuego');

        btnArma.onclick = () => {
            if(gamePaused) return;
            modoCombate = !modoCombate;
            btnFuego.style.display = modoCombate ? 'flex' : 'none';
            btnArma.innerText = modoCombate ? "SALIR" : "UZI";
        };

        // Bucle Animación
        let lastTime = performance.now();
        function animate() {
            animationId = requestAnimationFrame(animate);
            const now = performance.now();
            const deltaTime = now - lastTime;
            lastTime = now;

            const obstaculos = [...casas, ...edificios];
            const andando = Math.abs(mov.x) > 0.1 || Math.abs(mov.y) > 0.1;

            if (andando && !sDat.enAire) { 
                if (sonidoCaminar.paused) sonidoCaminar.play().catch(()=>{});
            } else {
                sonidoCaminar.pause();
            }

            if (clima) clima.actualizar(deltaTime);

            // FPS LOGIC
            jugador.rotation.y = THREE.MathUtils.degToRad(lon);
            if (andando) {
                const vf = modoCombate ? 0.06 : 0.055;
                const dF = new THREE.Vector3(mov.x, 0, -mov.y).applyQuaternion(jugador.quaternion);
                const nuevaX = jugador.position.x + dF.x * vf; 
                const nuevaZ = jugador.position.z + dF.z * vf;
                let choque = false;
                for (let obj of obstaculos) {
                    const dx = nuevaX - obj.mesh.position.x;
                    const dz = nuevaZ - obj.mesh.position.z;
                    if (Math.sqrt(dx*dx + dz*dz) < obj.radio) { choque = true; break; }
                }
                if (!choque) {
                    jugador.position.x = nuevaX;
                    jugador.position.z = nuevaZ;
                }
            }

            camera.position.set(jugador.position.x, jugador.position.y + 0.14, jugador.position.z);
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);
            const target = new THREE.Vector3();
            target.setFromSphericalCoords(1, phi, theta).add(camera.position);
            camera.lookAt(target);

            if (tieneArma) {
                miArma.visible = true;
                miArma.position.set(modoCombate ? 0.08 : 0.12, modoCombate ? 0.05 : 0.02, -0.1);
                miArma.rotation.set(0, Math.PI, 0);
            }

            if (sistemaNPC) sistemaNPC.actualizar();
            gestionarSalto(jugador, sDat);
            actualizarAnimacion(jugador, andando);
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
    </html>
